services:
  - type: web
    name: statusmy-api
    runtime: node
    region: singapore
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: FRONTEND_URL
        value: https://statusmy.onrender.com
      - key: DATABASE_PATH
        value: ./data/database.sqlite
    healthCheckPath: /api/health
    autoDeploy: true
